name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what tests need; skip sentence-transformers (heavy, gated by --use-embeddings flag at runtime).
          pip install requests responses tiktoken numpy scikit-learn rich pytest ruff openai python-dotenv

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q
